name: Build iOS, Android & Web
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  ios:
    name: iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Generate platform folders
        run: flutter create --project-name science_study_hub --org com.gabri .
      - name: Pod install
        run: |
          cd ios
          pod install --repo-update
      - name: Build iOS (no code sign)
        run: flutter build ios --release --no-codesign
      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ScienceStudyHub.ipa Payload/
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ScienceStudyHub.ipa
          retention-days: 30
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Generate platform folders
        run: flutter create --project-name science_study_hub --org com.gabri .
      - name: Build Android APK
        run: flutter build apk --release
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
  web:
    name: Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Generate platform folders
        run: flutter create --project-name science_study_hub --org com.gabri .
      - name: Build Web
        run: flutter build web --release
      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: build/web/
          retention-days: 30