name: Build iOS, Android & Web

# Force Node.js 24 runtime to silence the Node 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ── iOS ────────────────────────────────────────────────────────────────────
  ios:
    name: iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Generate platform folders
        run: flutter create --project-name science_study_hub --org com.gabri .

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Build iOS (no code sign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA + install guide
        run: |
          # Build the IPA archive (standard iOS format)
          mkdir -p IPA_output/Payload
          cp -r build/ios/iphoneos/Runner.app IPA_output/Payload/
          cd IPA_output
          zip -r ../ScienceStudyHub.ipa Payload/
          cd ..

          # Create a human-readable install folder so the artifact is self-explanatory
          mkdir -p ios_release
          cp ScienceStudyHub.ipa ios_release/

          cat > ios_release/HOW_TO_INSTALL.txt << 'EOF'
          ╔══════════════════════════════════════════════════════════════╗
          ║          Science Study Hub — iOS Install Guide               ║
          ╚══════════════════════════════════════════════════════════════╝

          The file "ScienceStudyHub.ipa" is an iOS app package.
          It CANNOT be opened on Windows or Mac like a normal program.
          It must be INSTALLED onto an iPhone or iPad.

          ──────────────────────────────────────────────────────────────
          OPTION 1 — Sideloadly (FREE, Windows or Mac, recommended)
          ──────────────────────────────────────────────────────────────
          1. Download Sideloadly from: https://sideloadly.io
          2. Connect your iPhone/iPad via USB and trust the computer.
          3. Open Sideloadly → drag "ScienceStudyHub.ipa" into the window.
          4. Enter your Apple ID (free account is enough).
          5. Click "Start" — the app installs in ~1 minute.
          6. On iPhone: Settings → General → VPN & Device Management
             → tap your Apple ID → "Trust" → open the app.
          Note: Free Apple ID re-signs expire after 7 days; just repeat.

          ──────────────────────────────────────────────────────────────
          OPTION 2 — AltStore (FREE, Windows or Mac)
          ──────────────────────────────────────────────────────────────
          1. Install AltServer on your PC: https://altstore.io
          2. Install AltStore on your iPhone via AltServer.
          3. In AltStore on the iPhone → "My Apps" → "+" → pick the IPA.

          ──────────────────────────────────────────────────────────────
          OPTION 3 — Use the Web version (no iPhone needed!)
          ──────────────────────────────────────────────────────────────
          Download the "web-app" artifact from the same GitHub Actions run.
          Extract it and open "index.html" in any browser — full app, no install.

          ──────────────────────────────────────────────────────────────
          WHY does opening the IPA show a "Payload" folder?
          ──────────────────────────────────────────────────────────────
          An IPA file is a ZIP archive. Windows/Mac file explorers unzip
          it showing Payload/Runner.app. Runner.app is the iOS app bundle —
          it only runs ON a device, never on a PC. Use Sideloadly above.
          EOF

      - name: Upload iOS artifact (IPA + install guide)
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios_release/
          retention-days: 30

  # ── Android ────────────────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Generate platform folders
        run: flutter create --project-name science_study_hub --org com.gabri .

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Web ────────────────────────────────────────────────────────────────────
  web:
    name: Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Generate platform folders
        run: flutter create --project-name science_study_hub --org com.gabri .

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: build/web/
          retention-days: 30

